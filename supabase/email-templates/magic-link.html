<!--
  Supabase magic-link email template.
  Paste into: Supabase Dashboard → Authentication → Email Templates → Magic Link.
  Inline styles only — email clients strip <style> blocks unreliably.
  Geist is loaded via Google Fonts; Apple Mail and Gmail-web honor it.
  Outlook desktop and Gmail mobile fall back to system sans (Helvetica/Arial).
-->
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&display=swap" rel="stylesheet">

<div style="font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color: #1a1613; line-height: 1.6; max-width: 480px; margin: 0 auto; padding: 32px 24px; text-align: left;">

  <div style="font-size: 64px; line-height: 1; color: #b84a2e; margin: 0 0 24px;">
    ✦
  </div>

  <h2 style="font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: 700; margin: 0 0 16px; color: #1a1613;">
    Sign in to ProseLab
  </h2>

  <p style="margin: 0 0 20px; font-size: 15px;">
    Follow this link to log in:
  </p>

  <p style="margin: 0 0 28px;">
    <a href="{{ .ConfirmationURL }}"
       style="color: #b84a2e; font-weight: 600; text-decoration: underline; text-underline-offset: 3px;">
      Log in to ProseLab →
    </a>
  </p>

  <p style="margin: 0; font-size: 12px; color: #7a6e68; line-height: 1.5;">
    Sent one-time for sign in to the ProseLab platform. If you didn't request this, you can safely disregard this email.
  </p>

</div>
